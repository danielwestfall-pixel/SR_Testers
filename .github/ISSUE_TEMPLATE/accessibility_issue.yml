name: Accessibility Issue
description: Report an accessibility problem with a component
title: "[A11Y] "
labels: ["accessibility", "bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an accessibility issue! This helps us ensure all components are fully usable by everyone.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component has the accessibility issue?
      options:
        - ClickToRevealButton
        - Other (please specify in description)
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Type of Accessibility Issue
      options:
        - Keyboard Navigation Problem
        - Screen Reader Announcement Problem
        - ARIA Attribute Issue
        - Focus Management Problem
        - Color Contrast Problem
        - Touch Target Size Problem
        - Other
      validations:
        required: true

  - type: textarea
    id: device_info
    attributes:
      label: Device & Software
      description: What device, browser, and assistive technology?
      placeholder: |
        Example:
        - Device: Windows 11
        - Browser: Chrome 120
        - Screen Reader: NVDA 2024.1
        - Other AT: (if applicable)
      validations:
        required: true

  - type: textarea
    id: description
    attributes:
      label: Accessibility Problem
      description: What is the accessibility issue?
      placeholder: |
        Be specific about what doesn't work or what's inaccessible.
        Example: "NVDA does not announce that the button is a toggle"
      validations:
        required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this accessibility issue?
      placeholder: |
        1. Enable screen reader (NVDA/VoiceOver/etc)
        2. Navigate to component using Tab
        3. Attempt to operate with keyboard/screen reader
        4. Observe the problem
      validations:
        required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Accessible Behavior
      description: What should happen for accessibility?
      placeholder: |
        Example: "Screen reader should announce: 'Click to reveal, button, collapsed'"
      validations:
        required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: |
        Example: "Screen reader announces: 'Click to reveal, button' (missing state)"
      validations:
        required: true

  - type: textarea
    id: standards
    attributes:
      label: Applicable Standards
      description: Which accessibility standards does this violate?
      placeholder: |
        Example:
        - WCAG 2.1 Level AA - 2.1.1 Keyboard (level A)
        - WCAG 2.1 Level AA - 4.1.3 Status Messages (level AA)
        - ARIA Authoring Practices Guide

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Screenshots, videos, or other details that help understand the issue.
        Video recordings are especially helpful for accessibility issues.
      placeholder: Attach files or paste links

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Tested with actual assistive technology
          required: false
        - label: Issue is reproducible
          required: false
        - label: Not a misunderstanding of how to use the component
          required: false
